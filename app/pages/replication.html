<!-- This navigation maintains all security (CSRF, Auth) and real system state -->

<div id="nav-root"></div>

<script>
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// Navigation behavior
function navigateToSection(section) {
  if (section === 'dashboard') {
    window.location.href = 'index.html';
  }
}

function toggleSubNav(section, button) {
  // Remove active from all nav links
  document.querySelectorAll('.nav-link').forEach(link => {
    link.classList.remove('active');
  });
  
  // Add active to clicked button
  if (button) {
    button.classList.add('active');
  }
  
  // Hide all sub-navs
  document.querySelectorAll('.nav-sub').forEach(sub => {
    sub.classList.remove('active');
  });
  
  // Show selected sub-nav
  const subNav = document.getElementById(`sub-${section}`);
  if (subNav) {
    subNav.classList.add('active');
    document.body.classList.add('has-subnav');
  }
}

// Auto-detect current section and page on load
(function() {
  const currentPage = window.location.pathname.split('/').pop() || 'index.html';
  
  // Page to section mapping
  const pageMap = {
    'acl-manager.html': { section: 'storage', page: 'acl-manager' },
    'audit.html': { section: 'security', page: 'audit' },
    'certificates.html': { section: 'security', page: 'certificates' },
    'cloud-sync.html': { section: 'storage', page: 'cloud-sync' },
    'directory-service.html': { section: 'identity', page: 'directory-service' },
    'docker.html': { section: 'compute', page: 'docker' },
    'files-enhanced.html': { section: 'storage', page: 'files-enhanced' },
    'files.html': { section: 'storage', page: 'files' },
    'firewall.html': { section: 'security', page: 'firewall' },
    'groups.html': { section: 'identity', page: 'groups' },
    'hardware.html': { section: 'system', page: 'hardware' },
    'index.html': { section: 'dashboard', page: null },
    'ipmi.html': { section: 'system', page: 'ipmi' },
    'logs.html': { section: 'system', page: 'logs' },
    'modules.html': { section: 'compute', page: 'modules' },
    'network-dns.html': { section: 'network', page: 'network-dns' },
    'network-interfaces.html': { section: 'network', page: 'network-interfaces' },
    'network-routing.html': { section: 'network', page: 'network-routing' },
    'network.html': { section: 'network', page: 'network' },
    'pools-advanced.html': { section: 'storage', page: 'pools-advanced' },
    'pools.html': { section: 'storage', page: 'pools' },
    'power-management.html': { section: 'system', page: 'power-management' },
    'quotas.html': { section: 'storage', page: 'quotas' },
    'rbac-management.html': { section: 'identity', page: 'rbac-management' },
    'removable-media-ui.html': { section: 'system', page: 'removable-media-ui' },
    'replication.html': { section: 'storage', page: 'replication' },
    'reporting.html': { section: 'system', page: 'reporting' },
    'security.html': { section: 'security', page: 'security' },
    'settings.html': { section: 'system', page: 'settings' },
    'shares.html': { section: 'storage', page: 'shares' },
    'snapshot-scheduler.html': { section: 'storage', page: 'snapshot-scheduler' },
    'system-monitoring.html': { section: 'system', page: 'system-monitoring' },
    'system-settings.html': { section: 'system', page: 'system-settings' },
    'ups.html': { section: 'system', page: 'ups' },
    'users.html': { section: 'identity', page: 'users' },
    'zfs-encryption.html': { section: 'storage', page: 'zfs-encryption' }
  };
  
  const current = pageMap[currentPage];
  if (current) {
    // Activate section button
    const sectionBtn = document.querySelector(`[data-section="${current.section}"]`);
    if (sectionBtn) {
      sectionBtn.classList.add('active');
    }
    
    // Show and activate sub-nav if not dashboard
    if (current.section !== 'dashboard') {
      const subNav = document.getElementById(`sub-${current.section}`);
      if (subNav) {
        subNav.classList.add('active');
        document.body.classList.add('has-subnav');
        
        // Activate current page in sub-nav
        if (current.page) {
          const pageLink = subNav.querySelector(`[data-page="${current.page}"]`);
          if (pageLink) {
            pageLink.classList.add('active');
          }
        }
      }
    }
  }
})();

// Keyboard shortcuts
function showKeyboardHelp() {
  if (window.EnhancedUI) {
    const shortcuts = `Keyboard Shortcuts:

g + d → Dashboard
g + s → Storage
g + c → Compute
g + n → Network
g + u → Identity
g + e → Security
g + y → System

r → Refresh page
Esc → Close modals
? → Show this help`;
    EnhancedUI.toast(shortcuts, 'info', 8000);
  }
}

// Enhanced keyboard shortcuts for sections
(function() {
  let keySequence = '';
  let keyTimeout;
  
  document.addEventListener('keydown', (e) => {
    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
    
    keySequence += e.key;
    clearTimeout(keyTimeout);
    
    const shortcuts = {
      'gd': 'index.html',
      'gs': () => toggleSubNav('storage', document.querySelector('[data-section="storage"]')),
      'gc': () => toggleSubNav('compute', document.querySelector('[data-section="compute"]')),
      'gn': () => toggleSubNav('network', document.querySelector('[data-section="network"]')),
      'gu': () => toggleSubNav('identity', document.querySelector('[data-section="identity"]')),
      'ge': () => toggleSubNav('security', document.querySelector('[data-section="security"]')),
      'gy': () => toggleSubNav('system', document.querySelector('[data-section="system"]'))
    };
    
    if (shortcuts[keySequence]) {
      e.preventDefault();
      const action = shortcuts[keySequence];
      if (typeof action === 'function') {
        action();
      } else {
        window.location.href = action;
      }
      keySequence = '';
    } else if (e.key === '?') {
      e.preventDefault();
      showKeyboardHelp();
    }
    
    keyTimeout = setTimeout(() => keySequence = '', 1000);
  });
})();

// Connection status monitoring (integrates with existing connection-monitor.js)
if (window.ConnectionMonitor) {
  window.ConnectionMonitor.on('statusChange', (online) => {
    const status = document.getElementById('navConnectionStatus');
    if (status) {
      if (online) {
        status.classList.remove('offline');
        status.classList.add('online');
        status.innerHTML = '<span class="status-dot"></span><span>Connected</span>';
      } else {
        status.classList.remove('online');
        status.classList.add('offline');
        status.innerHTML = '<span class="status-dot"></span><span>Offline</span>';
      }
    }
  });
}
</script>

<script src="/assets/js/ui-components.js?v=3.3.0"></script>
<script>
const ui = new DPlaneUI();

async function createTask() {
  const result = await ui.form('Create Replication Task', [
    { name: 'name', label: 'Task Name', type: 'text', required: true },
    { name: 'source', label: 'Source Dataset', type: 'text', required: true, placeholder: 'pool/dataset' },
    { name: 'target', label: 'Target', type: 'text', required: true, value: 'backup-server:/backups' },
    { name: 'schedule', label: 'Schedule', type: 'select', options: [
      { value: 'hourly', label: 'Every Hour' },
      { value: 'daily', label: 'Daily at 02:00' },
      { value: 'weekly', label: 'Weekly (Sunday)' }
    ], required: true }
  ], 'Create');
  
  if (result) {
    ui.showLoading('Creating replication task...');
    
    try {
      const response = await csrfFetch('/api/replication/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'create', ...result })
      });
      
      const data = await response.json();
      ui.hideLoading();
      
      if (data.success) {
        ui.toast('Replication task created', 'success');
        setTimeout(() => location.reload(), 1000);
      } else {
        ui.toast(data.error || 'Failed to create task', 'error');
      }
    } catch (error) {
      ui.hideLoading();
      ui.toast('Network error: ' + error.message, 'error');
    }
  }
}

async function editTask(id) {
  const result = await ui.form(`Edit Task: ${id}`, [
    { name: 'schedule', label: 'Schedule', type: 'select', options: [
      { value: 'hourly', label: 'Every Hour' },
      { value: 'daily', label: 'Daily at 02:00' },
      { value: 'weekly', label: 'Weekly (Sunday)' }
    ] },
    { name: 'enabled', label: 'Enabled', type: 'checkbox', checked: true }
  ], 'Update');
  
  if (result) {
    ui.showLoading('Updating task...');
    
    try {
      const response = await csrfFetch('/api/replication/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'update', task_id: id, ...result })
      });
      
      const data = await response.json();
      ui.hideLoading();
      
      if (data.success) {
        ui.toast('Task updated', 'success');
        setTimeout(() => location.reload(), 1000);
      } else {
        ui.toast(data.error || 'Failed to update task', 'error');
      }
    } catch (error) {
      ui.hideLoading();
      ui.toast('Network error: ' + error.message, 'error');
    }
  }
}

async function runTask(id) {
  if (await ui.confirm('Run Task Now?', `Run ${id} replication now? This may take some time.`)) {
    try {
      const response = await csrfFetch('/api/replication/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'run', task_id: id })
      });
      const data = await response.json();
      if (!data.job_id) { ui.toast(data.error || 'Failed to start job', 'error'); return; }
      const job = await ui.pollJob(data.job_id, 'Running replication task…');
      if (job.status === 'done') { ui.toast('Replication task complete', 'success'); }
      else { ui.toast(job.error || 'Replication task failed', 'error'); }
    } catch (error) {
      ui.hideLoading();
      ui.toast('Network error: ' + error.message, 'error');
    }
  }
}

async function loadReplicationTasks() {
  try {
    const response = await csrfFetch('/api/backup/rsync');
    const data = await response.json();
    
    if (data.success && data.tasks && data.tasks.length > 0) {
      renderReplicationTasks(data.tasks);
    } else {
      document.getElementById('replication-tasks-container').innerHTML = '<div class="task-card"><p style="color: rgba(255,255,255,0.5); text-align: center; padding: 40px;">No replication tasks configured</p></div>';
    }
  } catch (error) {
    document.getElementById('replication-tasks-container').innerHTML = '<div class="task-card"><p style="color: #ef4444; text-align: center; padding: 40px;">Failed to load replication tasks</p></div>';
  }
}

function renderReplicationTasks(tasks) {
  const container = document.getElementById('replication-tasks-container');
  container.innerHTML = '';
  
  tasks.forEach(task => {
    const card = document.createElement('div');
    card.className = 'task-card';
    
    const statusBadge = task.enabled ? 
      '<div class="badge badge-success"><span class="material-symbols-rounded" style="font-size:16px;">check_circle</span> Enabled</div>' :
      '<div class="badge badge-neutral"><span class="material-symbols-rounded" style="font-size:16px;">pause</span> Disabled</div>';
    
    const lastRunStatus = task.last_run_status === 'success' ?
      '<span style="padding:6px 12px;background:rgba(16,185,129,0.2);border-radius:8px;font-size:13px;color:var(--success);">Success</span>' :
      '<span style="padding:6px 12px;background:rgba(239,68,68,0.2);border-radius:8px;font-size:13px;color:#ef4444;">Failed</span>';
    
    card.innerHTML = `
      <div class="task-header">
        <span class="material-symbols-rounded task-icon">settings_backup_restore</span>
        <div class="task-info">
          <div class="task-name">${escapeHtml(task.name)}</div>
          <div class="task-details">${task.source} → ${task.destination} • ${task.schedule}</div>
        </div>
        ${statusBadge}
        <button class="icon-btn" onclick="editTask('"+JSON.stringify(task.id)+"')"><span class="material-symbols-rounded">edit</span></button>
        <button class="icon-btn" onclick="runTask('"+JSON.stringify(task.id)+"')"><span class="material-symbols-rounded">play_arrow</span></button>
      </div>
      <div style="display:flex;gap:12px;">
        ${task.last_run ? `<span style="padding:6px 12px;background:rgba(255,255,255,0.05);border-radius:8px;font-size:13px;">Last run: ${task.last_run}</span>` : ''}
        ${task.last_run_status ? lastRunStatus : ''}
        ${task.size ? `<span style="padding:6px 12px;background:rgba(255,255,255,0.05);border-radius:8px;font-size:13px;">${task.size}</span>` : ''}
      </div>
    `;
    
    container.appendChild(card);
  });
}

// Load tasks on page load
loadReplicationTasks();

</script>

          <input id="repl-snap" type="text" placeholder="tank/data@daily-2025-01-01" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:var(--md-sys-shape-corner-medium);padding:10px 16px;color:#fff;font-family:monospace;"></div>

          <input id="repl-host" type="text" placeholder="backup.local" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:var(--md-sys-shape-corner-medium);padding:10px 16px;color:#fff;"></div>
        <div><label style="font-size:12px;color:rgba(255,255,255,0.5);display:block;margin-bottom:6px;">Remote Pool</label>
          <input id="repl-pool" type="text" placeholder="backup/nas" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:var(--md-sys-shape-corner-medium);padding:10px 16px;color:#fff;font-family:monospace;"></div>
        <div><label style="font-size:12px;color:rgba(255,255,255,0.5);display:block;margin-bottom:6px;">Rate Limit</label>
          <input id="repl-rate" type="text" placeholder="50M (empty=unlimited)" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:var(--md-sys-shape-corner-medium);padding:10px 16px;color:#fff;"></div>
        <div><label style="font-size:12px;color:rgba(255,255,255,0.5);display:block;margin-bottom:6px;">Remote User</label>
          <input id="repl-user" type="text" value="root" placeholder="root" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:var(--md-sys-shape-corner-medium);padding:10px 16px;color:#fff;"></div>
        <div><label style="font-size:12px;color:rgba(255,255,255,0.5);display:block;margin-bottom:6px;">SSH Key Path <span style="opacity:0.5;">(defaults to generated key)</span></label>
          <input id="repl-key" type="text" value="/root/.ssh/dplaneos_replication" placeholder="/root/.ssh/dplaneos_replication" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:var(--md-sys-shape-corner-medium);padding:10px 16px;color:#fff;font-family:monospace;"></div>
      </div>
      <div style="display:flex;gap:12px;margin-top:20px;align-items:center;">
        <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" id="repl-resume" style="accent-color:var(--md-sys-color-primary);width:16px;height:16px;"> Resume interrupted</label>
        <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" id="repl-compressed" checked style="accent-color:var(--md-sys-color-primary);width:16px;height:16px;"> Compressed</label>
        <div style="flex:1;"></div>
        <button class="btn" onclick="testRemote()" style="background:rgba(255,255,255,0.05);">Test Connection</button>
        <button class="btn btn-primary" onclick="startReplication()"><span class="material-symbols-rounded" style="font-size:18px;">send</span> Replicate</button>
      </div>
    </div>
  `;
  main.appendChild(s);
});
async function loadPubKey() {
  try {
    const r = await csrfFetch('/api/replication/ssh-pubkey');
    const d = await r.json();
    renderKeyStatus(d);
  } catch(e) {
    document.getElementById('ssh-key-status').innerHTML =
      '<p style="color:rgba(255,255,255,0.4);font-size:14px;">Could not load key status</p>';
  }
}

function renderKeyStatus(d) {
  const status = document.getElementById('ssh-key-status');
  const pubkeyDisplay = document.getElementById('pubkey-display');
  const pubkeyText = document.getElementById('pubkey-text');
  const copyBtn = document.getElementById('copy-key-btn');

  if (d.exists && d.public_key) {
    status.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);border-radius:10px;">
        <span class="material-symbols-rounded" style="color:var(--success);font-size:20px;">check_circle</span>
        <span style="font-size:14px;">Replication key exists — ready for use. Regenerating invalidates the key on all remotes.</span>
      </div>`;
    pubkeyDisplay.style.display = 'block';
    pubkeyText.value = d.public_key;
    copyBtn.disabled = false;
  } else {
    status.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);border-radius:10px;">
        <span class="material-symbols-rounded" style="color:#f59e0b;font-size:20px;">warning</span>
        <span style="font-size:14px;">No replication key found. Generate one to enable remote replication.</span>
      </div>`;
    pubkeyDisplay.style.display = 'none';
    copyBtn.disabled = true;
  }
}

async function generateKey() {
  if (document.getElementById('pubkey-display').style.display !== 'none') {
    if (!await ui.confirm('Regenerate Key?', 'This will invalidate the current key on all remote hosts. You will need to re-run Install on Remote for each host.')) return;
  }
  ui.showLoading('Generating ed25519 key pair…');
  try {
    const r = await csrfFetch('/api/replication/ssh-keygen', { method: 'POST', body: '{}' });
    const d = await r.json();
    ui.hideLoading();
    if (d.success) {
      renderKeyStatus({ exists: true, public_key: d.public_key });
      ui.toast('Key generated successfully', 'success');
    } else {
      ui.toast(d.error || 'Key generation failed', 'error');
    }
  } catch(e) {
    ui.hideLoading();
    ui.toast('Error: ' + e.message, 'error');
  }
}

function toggleCopyKeyForm() {
  const form = document.getElementById('copy-key-form');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

async function installKey() {
  const host = document.getElementById('cid-host').value.trim();
  const user = document.getElementById('cid-user').value.trim() || 'root';
  const port = parseInt(document.getElementById('cid-port').value) || 22;
  const pass = document.getElementById('cid-pass').value;

  if (!host) { ui.toast('Remote host is required', 'warning'); return; }
  if (!pass) { ui.toast('Password is required', 'warning'); return; }

  ui.showLoading('Installing key on ' + host + '…');
  try {
    const r = await csrfFetch('/api/replication/ssh-copy-id', {
      method: 'POST',
      body: JSON.stringify({ remote_host: host, remote_user: user, remote_port: port, password: pass })
    });
    const d = await r.json();
    ui.hideLoading();
    if (d.success) {
      document.getElementById('cid-pass').value = '';
      toggleCopyKeyForm();
      ui.toast(d.message || 'Key installed successfully', 'success');
    } else {
      ui.toast(d.error || 'Key installation failed', 'error');
    }
  } catch(e) {
    ui.hideLoading();
    ui.toast('Error: ' + e.message, 'error');
  }
}

function copyPubKey() {
  const text = document.getElementById('pubkey-text').value;
  navigator.clipboard.writeText(text).then(() => {
    ui.toast('Public key copied to clipboard', 'success');
  }).catch(() => {
    // Fallback for non-HTTPS contexts
    document.getElementById('pubkey-text').select();
    document.execCommand('copy');
    ui.toast('Public key copied', 'success');
  });
}

async function testRemote() {
  const host = document.getElementById('repl-host').value;
  if (!host) { ui.toast('Enter host','warning'); return; }
  try { const r = await csrfFetch('/api/replication/test',{method:'POST',body:JSON.stringify({remote_host:host,remote_user:'root'})}); const d = await r.json(); d.success ? ui.toast('Connection OK ('+d.duration_ms+'ms)','success') : ui.toast('Failed: '+d.error,'error'); } catch(e) { ui.toast('Error','error'); }
}
async function startReplication() {
  const data = { snapshot:document.getElementById('repl-snap').value, remote_host:document.getElementById('repl-host').value, remote_pool:document.getElementById('repl-pool').value, rate_limit:document.getElementById('repl-rate').value, resume:document.getElementById('repl-resume').checked, compressed:document.getElementById('repl-compressed').checked, remote_user:document.getElementById('repl-user').value||'root', ssh_key_path:document.getElementById('repl-key').value||'/root/.ssh/dplaneos_replication' };
  if (!data.snapshot||!data.remote_host||!data.remote_pool) { ui.toast('Fill all required fields','warning'); return; }
  const btn = document.querySelector('[onclick*="startReplication"]');
  if (btn) { btn.disabled = true; btn.textContent = 'Replicating…'; }
  try {
    const r = await csrfFetch('/api/replication/remote', {method:'POST', body:JSON.stringify(data)});
    const d = await r.json();
    if (!d.job_id) { ui.toast(d.error || 'Failed to start job', 'error'); return; }
    const job = await ui.pollJob(d.job_id, 'Replicating data — this may take several minutes for large datasets…');
    if (btn) { btn.disabled = false; btn.innerHTML = '<span class="material-symbols-rounded" style="font-size:18px;">send</span> Replicate'; }
    if (job.status === 'done') {
      const ms = (job.result && job.result.duration_ms) || 0;
      ui.toast('Replication complete in ' + (ms/1000).toFixed(1) + 's', 'success');
    } else {
      ui.toast(job.error || 'Replication failed', 'error');
    }
  } catch(e) {
    ui.hideLoading();
    if (btn) { btn.disabled = false; btn.innerHTML = '<span class="material-symbols-rounded" style="font-size:18px;">send</span> Replicate'; }
    ui.toast('Error: '+e.message, 'error');
  }
}
</script>
