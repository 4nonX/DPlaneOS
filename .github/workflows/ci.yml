name: D-PlaneOS Unified CI/CD

on:
  push:
    branches: ["main", "master", "v*"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "master"]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 1: PREPARE - Build & Verify
  # ════════════════════════════════════════════════════════════════════════════
  prepare:
    name: Build & Verify
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: dplaneos
          POSTGRES_USER: dplaneos
          POSTGRES_PASSWORD: dplaneos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Check for Syncthing conflict files
        run: |
          CONFLICTS=$(find . -name '.sync-conflict-*.go' 2>/dev/null | head -20 || true)
          if [ -n "$CONFLICTS" ]; then
            echo "ERROR: Syncthing conflict files found - would cause duplicate symbol build failures:"
            echo "$CONFLICTS"
            exit 1
          fi
          echo "No Syncthing conflict files found."

      - name: Set up Node.js
        if: hashFiles('app-react/package-lock.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app-react/package-lock.json
      
      - name: Install frontend dependencies
        if: hashFiles('app-react/package-lock.json') != ''
        working-directory: app-react
        run: npm ci
      
      - name: TypeScript typecheck
        if: hashFiles('app-react/package-lock.json') != ''
        working-directory: app-react
        run: npx tsc --noEmit
      
      - name: Verify app/ bundle is up to date
        if: hashFiles('app-react/package-lock.json') != ''
        run: |
          cd app-react
          npm run build
          cd ..
          CHANGED=$(git diff --name-only -- app/)
          NEW=$(git ls-files --others --exclude-standard -- app/)
          DELETED=$(git ls-files --deleted -- app/)
          if [ -n "$CHANGED" ] || [ -n "$NEW" ] || [ -n "$DELETED" ]; then
            echo "ERROR: committed app/ bundle is stale - these files differ after rebuilding."
            echo "Run 'npm run build' in app-react/ and commit the updated app/ directory."
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod
          cache-dependency-path: daemon/go.sum
      
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc libc6-dev postgresql-client gcc-aarch64-linux-gnu qemu-user-static libc6-arm64-cross

      - name: Run Go Tests
        working-directory: daemon
        run: go test -v -race ./...

      - name: Build binaries (amd64 & arm64)
        working-directory: daemon
        run: |
          mkdir -p ../build
          CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=$(cat ../VERSION)" -o ../build/dplaned-linux-amd64 ./cmd/dplaned/
          GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=$(cat ../VERSION)" -o ../build/dplaned-linux-arm64 ./cmd/dplaned/
      
      - name: ARM64 Sanity Check (QEMU)
        run: |
          chmod +x build/dplaned-linux-arm64
          qemu-aarch64-static -L /usr/aarch64-linux-gnu build/dplaned-linux-arm64 --version
      
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dplaneos-build
          path: |
            build/
            app/

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 2: VALIDATE - Full API Integration Tests
  # ════════════════════════════════════════════════════════════════════════════
  validate:
    name: API Integration Tests
    needs: prepare
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: dplaneos
          POSTGRES_USER: dplaneos
          POSTGRES_PASSWORD: dplaneos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dplaneos-build
      
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc libc6-dev zfsutils-linux postgresql-client python3-bcrypt curl nfs-kernel-server samba targetcli-fb acl ufw ipmitool
          sudo modprobe zfs
      
      - name: Positioning binary for scripts
        run: cp build/dplaned-linux-amd64 ./dplaned-ci && chmod +x ./dplaned-ci

      - name: Run API Test Suite
        env:
          CI_PASS: "CiAdmin1!Test"
          DATABASE_DSN: "postgres://dplaneos:dplaneos@localhost:5432/dplaneos?sslmode=disable"
        run: |
          chmod +x .github/scripts/api-integration-test.sh
          bash .github/scripts/api-integration-test.sh

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 3: HARDEN - Convergence & Failure Resilience
  # ════════════════════════════════════════════════════════════════════════════
  convergence:
    name: Convergence & Resilience
    needs: [prepare, validate]
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: dplaneos
          POSTGRES_USER: dplaneos
          POSTGRES_PASSWORD: dplaneos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dplaneos-build
      
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zfsutils-linux postgresql-client python3-bcrypt
          sudo modprobe zfs
      
      - name: Positioning binary for scripts
        run: cp build/dplaned-linux-amd64 ./dplaned-ci && chmod +x ./dplaned-ci

      - name: Run Convergence & Resilience Suite
        env:
          DATABASE_DSN: "postgres://dplaneos:dplaneos@localhost:5432/dplaneos?sslmode=disable"
        run: |
          chmod +x .github/scripts/convergence-test.sh
          bash .github/scripts/convergence-test.sh

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 4: INTEGRATE - Full Fleet & Install Tests
  # ════════════════════════════════════════════════════════════════════════════
  integration:
    name: Fleet & Install Tests
    needs: [prepare, validate, convergence]
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: dplaneos
          POSTGRES_USER: dplaneos
          POSTGRES_PASSWORD: dplaneos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dplaneos-build
      
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zfsutils-linux postgresql-client python3-bcrypt curl nginx nfs-kernel-server samba acl ufw
          sudo modprobe zfs
      
      - name: Positioning binary for scripts
        run: cp build/dplaned-linux-amd64 ./dplaned-ci && chmod +x ./dplaned-ci

      - name: Run Fleet/Install Suite
        env:
          CI_PASS: "CiAdmin1!Test"
          DATABASE_DSN: "postgres://dplaneos:dplaneos@localhost:5432/dplaneos?sslmode=disable"
        run: |
          chmod +x .github/scripts/fleet-integration-test.sh
          bash .github/scripts/fleet-integration-test.sh

  # ════════════════════════════════════════════════════════════════════════════
  # STAGE 4: RELEASE - Professional Build & Publish
  # ════════════════════════════════════════════════════════════════════════════
  release:
    name: Build & Publish Release
    needs: [validate, integration, convergence]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod
          cache-dependency-path: daemon/go.sum

      - name: Populate vendor directory
        working-directory: daemon
        run: go mod vendor
      
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dplaneos-build
      
      - name: Prepare Release Metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(cat VERSION | tr -d '[:space:]')"
          if [ "$FILE_VERSION" != "$VERSION" ]; then
            echo "ERROR: VERSION file ($FILE_VERSION) does not match tag ($VERSION)"
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          
          python3 .github/scripts/extract-release-notes.py "$VERSION" docs/reference/CHANGELOG.md > /tmp/release-notes.md
          HEADER=$(grep "^## v\?${VERSION}" docs/reference/CHANGELOG.md | head -1)
          CODENAME=$(echo "$HEADER" | sed 's/.*- "\(.*\)"/\1/' || echo "Release")
          DATE=$(echo "$HEADER" | grep -oP '\d{4}-\d{2}-\d{2}' | head -1 || date +%Y-%m-%d)
          RELEASE_TITLE="v${VERSION} (${DATE}) - \"${CODENAME}\""
          echo "title=${RELEASE_TITLE}" >> $GITHUB_OUTPUT
          
          # amd64
          AMD64_TARBALL="dplaneos-v${VERSION}-linux-amd64.tar.gz"
          cp build/dplaned-linux-amd64 build/dplaned
          tar czf "$AMD64_TARBALL" --transform="s|^|dplaneos-v${VERSION}/|" \
            --exclude='*.bak' --exclude='.git' \
            app/ build/dplaned daemon/ install/ nixos/ docs/ \
            .github/ .gitattributes .gitignore install.sh get.sh Makefile VERSION LICENSE README.md CONTRIBUTING.md \
            CLA-ENTITY.md CLA-INDIVIDUAL.md SECURITY.md
          
          # arm64
          ARM64_TARBALL="dplaneos-v${VERSION}-linux-arm64.tar.gz"
          cp build/dplaned-linux-arm64 build/dplaned
          tar czf "$ARM64_TARBALL" --transform="s|^|dplaneos-v${VERSION}/|" \
            --exclude='*.bak' --exclude='.git' \
            app/ build/dplaned daemon/ install/ nixos/ docs/ \
            .github/ .gitattributes .gitignore install.sh get.sh Makefile VERSION LICENSE README.md CONTRIBUTING.md \
            CLA-ENTITY.md CLA-INDIVIDUAL.md SECURITY.md
          
          # Checksums
          echo "amd64_tarball=${AMD64_TARBALL}" >> $GITHUB_OUTPUT
          echo "arm64_tarball=${ARM64_TARBALL}" >> $GITHUB_OUTPUT
          
          sha256sum "$AMD64_TARBALL" > "$AMD64_TARBALL.sha256"
          sha256sum "$ARM64_TARBALL" > "$ARM64_TARBALL.sha256"
          
          echo "amd64_sha=${AMD64_TARBALL}.sha256" >> $GITHUB_OUTPUT
          echo "arm64_sha=${ARM64_TARBALL}.sha256" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.meta.outputs.title }}
          body_path: /tmp/release-notes.md
          files: |
            ${{ steps.meta.outputs.amd64_tarball }}
            ${{ steps.meta.outputs.amd64_sha }}
            ${{ steps.meta.outputs.arm64_tarball }}
            ${{ steps.meta.outputs.arm64_sha }}
          draft: true
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
