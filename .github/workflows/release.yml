name: D-PlaneOS Release

# Trigger only on version tag push — prevents double-trigger from GitHub
# auto-creating a release when a tag is pushed.
on:
  push:
    tags:
      - 'v*'

jobs:
  ci:
    name: CI gate (must pass before release builds)
    uses: ./.github/workflows/validate.yml

  release:
    name: Build & Publish Release
    runs-on: ubuntu-22.04
    needs: ci
    env:
      GOWORK: off

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Syncthing conflict files
        run: |
          CONFLICTS=$(find . -name '.sync-conflict-*.go' 2>/dev/null | head -20 || true)
          if [ -n "$CONFLICTS" ]; then
            echo "ERROR: Syncthing conflict files found — would cause duplicate symbol build failures:"
            echo "$CONFLICTS"
            exit 1
          fi
          echo "No Syncthing conflict files found."

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building release v$VERSION"

      - name: Verify VERSION file matches tag
        run: |
          FILE_VERSION="$(cat VERSION | tr -d '[:space:]')"
          if [ "$FILE_VERSION" != "$VERSION" ]; then
            echo "ERROR: VERSION file ($FILE_VERSION) does not match tag ($VERSION)"
            exit 1
          fi
          echo "Version match: $VERSION"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod
          cache-dependency-path: daemon/go.sum

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc libc6-dev sqlite3 gcc-aarch64-linux-gnu

      - name: Vendor dependencies
        working-directory: daemon
        run: |
          go mod tidy
          go mod vendor

      - name: go vet
        working-directory: daemon
        run: go vet -mod=vendor ./...

      - name: Pre-create build directory
        run: mkdir -p build

      - name: Build daemon (amd64)
        working-directory: daemon
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=1 go build \
            -mod=vendor \
            -tags sqlite_fts5 \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o ../build/dplaned-linux-amd64 \
            ./cmd/dplaned/
          echo "amd64 Binary size: $(du -h ../build/dplaned-linux-amd64 | cut -f1)"

      - name: Build daemon (arm64)
        working-directory: daemon
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=1 CC=aarch64-linux-gnu-gcc go build \
            -mod=vendor \
            -tags sqlite_fts5 \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o ../build/dplaned-linux-arm64 \
            ./cmd/dplaned/
          echo "arm64 Binary size: $(du -h ../build/dplaned-linux-arm64 | cut -f1)"

      - name: Smoke test binary (amd64 only)
        run: |
          SMOKE_DB=$(mktemp /tmp/smoke-XXXXX.db)
          ./build/dplaned-linux-amd64 -db "$SMOKE_DB" -listen 127.0.0.1:19876 &
          PID=$!
          for i in $(seq 1 15); do
            curl -sf http://127.0.0.1:19876/health | grep -q '"ok"' && break
            sleep 1
          done
          HEALTH=$(curl -sf http://127.0.0.1:19876/health)
          echo "Health: $HEALTH"
          echo "$HEALTH" | grep -q '"ok"' || (kill $PID; echo "Health check failed"; exit 1)
          echo "$HEALTH" | grep -q "\"$VERSION\"" || (kill $PID; echo "Version mismatch in health endpoint: $HEALTH"; exit 1)
          kill $PID
          rm -f "$SMOKE_DB" "${SMOKE_DB}.backup" "${SMOKE_DB}-wal" "${SMOKE_DB}-shm"
          echo "Smoke test passed — version $VERSION confirmed"

      - name: Extract release notes and title
        run: |
          python3 install/scripts/extract-release-notes.py "$VERSION" docs/reference/CHANGELOG.md > /tmp/release-notes.md
          echo "Release notes extracted"
          head -3 /tmp/release-notes.md
          # Extract codename from heading: v4.1.1 (2026-03-09) — "Design System" → Design System
          CODENAME=$(grep "^## v${VERSION}" docs/reference/CHANGELOG.md | sed 's/.*— "\(.*\)"/\1/' | head -1)
          DATE=$(grep "^## v${VERSION}" docs/reference/CHANGELOG.md | grep -oP '\d{4}-\d{2}-\d{2}' | head -1)
          RELEASE_TITLE="v${VERSION} (${DATE}) — \"${CODENAME}\""
          echo "RELEASE_TITLE=$RELEASE_TITLE" >> $GITHUB_ENV
          echo "Title: $RELEASE_TITLE"

      - name: Package release tarballs
        run: |
          # Package amd64
          AMD64_TARBALL="dplaneos-v${VERSION}-linux-amd64.tar.gz"
          cp build/dplaned-linux-amd64 build/dplaned
          tar czf "$AMD64_TARBALL" \
            --transform="s|^|dplaneos-v${VERSION}/|" \
            --exclude='*.bak' --exclude='.sync-conflict-*' --exclude='.git' --exclude='legacy' --exclude='app-built' \
            app/ build/dplaned build/.gitkeep daemon/ install/ nixos/ docs/ \
            .github/ .gitattributes .gitignore install.sh get.sh Makefile VERSION LICENSE README.md CONTRIBUTING.md \
            CLA-ENTITY.md CLA-INDIVIDUAL.md SECURITY.md

          # Package arm64
          ARM64_TARBALL="dplaneos-v${VERSION}-linux-arm64.tar.gz"
          cp build/dplaned-linux-arm64 build/dplaned
          tar czf "$ARM64_TARBALL" \
            --transform="s|^|dplaneos-v${VERSION}/|" \
            --exclude='*.bak' --exclude='.sync-conflict-*' --exclude='.git' --exclude='legacy' --exclude='app-built' \
            app/ build/dplaned build/.gitkeep daemon/ install/ nixos/ docs/ \
            .github/ .gitattributes .gitignore install.sh get.sh Makefile VERSION LICENSE README.md CONTRIBUTING.md \
            CLA-ENTITY.md CLA-INDIVIDUAL.md SECURITY.md

          echo "AMD64_TARBALL=$AMD64_TARBALL" >> $GITHUB_ENV
          echo "ARM64_TARBALL=$ARM64_TARBALL" >> $GITHUB_ENV

      - name: Generate SHA256 checksums
        run: |
          AMD64_SHA="dplaneos-v${VERSION}-linux-amd64.tar.gz.sha256"
          ARM64_SHA="dplaneos-v${VERSION}-linux-arm64.tar.gz.sha256"
          sha256sum "$AMD64_TARBALL" > "$AMD64_SHA"
          sha256sum "$ARM64_TARBALL" > "$ARM64_SHA"
          echo "AMD64_SHA=$AMD64_SHA" >> $GITHUB_ENV
          echo "ARM64_SHA=$ARM64_SHA" >> $GITHUB_ENV

      - name: Publish GitHub Release (draft — edit notes then publish)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_TITLE }}
          body_path: /tmp/release-notes.md
          files: |
            ${{ env.AMD64_TARBALL }}
            ${{ env.AMD64_SHA }}
            ${{ env.ARM64_TARBALL }}
            ${{ env.ARM64_SHA }}
          draft: true
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
