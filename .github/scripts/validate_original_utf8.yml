name: D-PlaneOS CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_call:  # allow release.yml to invoke this as a gate

# Purpose: Give confidence that the system delivers promised capabilities.
# Three test layers:
#   1. Pre-auth (first-boot): setup wizard endpoints accessible without session
#   2. Auth: login/logout/RBAC/session security
#   3. Write-path round-trips: create ÔåÆ verify on disk ÔåÆ read back ÔåÆ assert shape ÔåÆ delete
#      (catches field-name mismatches, wrong HTTP methods, silent failures)
#
# WHAT THIS WORKFLOW TESTS:
#   - First-boot: setup-admin, setup-complete accessible without session (catches middleware gaps)
#   - Auth: login, session, logout, change-password, 401/400 behaviour
#   - RBAC: user list, create user, session role, /me/permissions, API tokens
#   - ZFS: pools (shape: data[].name, data[].health, data[].capacity), datasets, snapshots
#     (create/rollback/destroy), health, iostat, capacity, SMART, schedules
#   - System: status, profile, preflight, settings, network, logs, disks, NTP, UPS
#   - Shares: create ÔåÆ list and assert fields match ÔåÆ delete (catches read_only/guest_ok name bugs)
#   - NFS: create ÔåÆ list ÔåÆ delete
#   - Docker: containers shape (containers[].id, .name, .state all present and non-empty)
#   - Files: mkdir ÔåÆ list (assert entry present) ÔåÆ write ÔåÆ read back (assert content) ÔåÆ
#     rename ÔåÆ chmod (assert mode) ÔåÆ delete (catches every file manager bug class)
#   - Firewall: status shape (rules is array not string)
#   - ServiceUnit: assert ReadWritePaths in dplaned.service covers required paths
#   - One assert_json hit per remaining subsystem: git-sync, webhooks, SMTP, LDAP, HA,
#     iSCSI, sandbox, trash, removable, power, certs
#   - Security: weak password rejected, command injection blocked, Prometheus /metrics
#
# REMAINING GAPS (cannot be tested in CI without real hardware):
#   - install.sh (use integration-test.sh on real hardware)
#   - replication, timemachine, cloud-sync, backup/rsync
#   - ZFS encryption (requires passphrase-protected dataset)
#   - NixOS, gitops apply
#   - systemd ProtectSystem=strict (daemon runs bare in CI, not via systemd)
#   - scrub on real spinning disk

jobs:
  ci:
    name: Build + API integration
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Syncthing conflict files
        run: |
          CONFLICTS=$(find . -name '.sync-conflict-*.go' 2>/dev/null | head -20 || true)
          if [ -n "$CONFLICTS" ]; then
            echo "ERROR: Syncthing conflict files found - would cause duplicate symbol build failures:"
            echo "$CONFLICTS"
            exit 1
          fi
          echo "No Syncthing conflict files found."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app-react/package-lock.json

      - name: Install frontend dependencies
        working-directory: app-react
        run: npm ci

      - name: TypeScript typecheck
        working-directory: app-react
        run: npx tsc --noEmit

      - name: Verify app/ bundle is up to date
        run: |
          # Rebuild the frontend (vite.config.ts hard-codes outDir: '../app').
          # If the committed app/ differs from a fresh build, the developer
          # forgot to run `npm run build` and commit the result.
          cd app-react
          npm run build 2>&1
          cd ..
          # Any modifications to app/ mean the bundle was stale.
          CHANGED=$(git diff --name-only -- app/)
          NEW=$(git ls-files --others --exclude-standard -- app/)
          DELETED=$(git ls-files --deleted -- app/)
          if [ -n "$CHANGED" ] || [ -n "$NEW" ] || [ -n "$DELETED" ]; then
            echo "ERROR: committed app/ bundle is stale - these files differ after rebuilding:"
            [ -n "$CHANGED"  ] && echo "  Modified: $CHANGED"
            [ -n "$NEW"      ] && echo "  Added:    $NEW"
            [ -n "$DELETED"  ] && echo "  Deleted:  $DELETED"
            echo ""
            echo "Run 'npm run build' in app-react/ and commit the updated app/ directory."
            exit 1
          fi
          echo "Bundle up to date: $(ls app/assets/index-*.js | head -1 | xargs basename)"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod
          cache-dependency-path: daemon/go.sum

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc libc6-dev zfsutils-linux sqlite3 python3-bcrypt curl nfs-kernel-server acl ufw ipmitool
          sudo modprobe zfs

      - name: Build daemon
        working-directory: daemon
        run: |
          CGO_ENABLED=1 go build \
            -tags sqlite_fts5 \
            -ldflags="-s -w" \
            -o ../dplaned-ci \
            ./cmd/dplaned/

      - name: Create loopback ZFS pool
        run: |
          sudo truncate -s 512M /tmp/vdisk0.img
          sudo truncate -s 512M /tmp/vdisk1.img
          sudo truncate -s 512M /tmp/vdisk2.img
          LOOP0=$(sudo losetup --find --show /tmp/vdisk0.img)
          LOOP1=$(sudo losetup --find --show /tmp/vdisk1.img)
          LOOP2=$(sudo losetup --find --show /tmp/vdisk2.img)
          echo "LOOP0=$LOOP0" >> $GITHUB_ENV
          echo "LOOP1=$LOOP1" >> $GITHUB_ENV
          echo "LOOP2=$LOOP2" >> $GITHUB_ENV

      - name: Create Test ZFS Pool
        run: |
          sudo mkdir -p /mnt/testpool
          sudo zpool create -f -m /mnt/testpool testpool raidz1 "$LOOP0" "$LOOP1" "$LOOP2"
          # POSIX ACLs must be explicitly enabled on ZFS datasets for getfacl to work.
          sudo zfs set acltype=posixacl testpool
          sudo zpool status testpool

      - name: Initialise database
        run: |
          sudo mkdir -p /var/lib/dplaneos
          sudo bash install/scripts/init-database-with-lock.sh

      - name: "v6: Create sample state.yaml for enforcement tests"
        run: |
          cat > /tmp/state.yaml <<EOF
          version: "6"
          pools:
            - name: testpool
              topology:
                data:
                  - type: raidz1
                    disks:
                      - $LOOP0
                      - $LOOP1
                      - $LOOP2
          datasets:
            - name: testpool
              mountpoint: /mnt/testpool
            - name: testpool/ci-enforcement
              mountpoint: /mnt/testpool/ci-enforcement
              compression: lz4
          EOF

      - name: "v6: Test Deterministic Bootstrap (-apply)"
        run: |
          # Use the newly built CI binary to run a one-off reconciliation.
          # This verifies Phase 3: Reliability & Bootstrap.
          chmod +x dplaned-ci
          sudo ./dplaned-ci -apply \
            -db /var/lib/dplaneos/dplaneos.db \
            -gitops-state /tmp/state.yaml \
            -smb-conf /tmp/smb-ci.conf
          
          # Verify the dataset was actually created by the bootstrap
          sudo zfs list testpool/ci-enforcement > /dev/null

      - name: "v6: Test Serialization Round-trip"
        run: |
          # Verifies Phase 4: Parse(Print(S)) == S
          sudo ./dplaned-ci -test-serialization -gitops-state /tmp/state.yaml

      - name: "v6: Test Deterministic Idempotency"
        run: |
          # Verifies Phase 4: Apply(S); Apply(S) has zero changes
          sudo ./dplaned-ci -test-idempotency \
            -db /var/lib/dplaneos/dplaneos.db \
            -gitops-state /tmp/state.yaml \
            -smb-conf /tmp/smb-ci.conf

      - name: Start daemon
        run: |
          chmod +x dplaned-ci
          sudo mkdir -p /opt/dplaneos /var/log/dplaneos /etc/dplaneos
          sudo cp -r app /opt/dplaneos/app
          sudo ./dplaned-ci \
            -db /var/lib/dplaneos/dplaneos.db \
            -listen 127.0.0.1:9000 \
            -smb-conf /var/lib/dplaneos/smb-shares.conf \
            &>/tmp/dplaned.log &
          echo $! > /tmp/dplaned.pid
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:9000/health | grep -q '"ok"' && break
            sleep 1
          done
          curl -sf http://127.0.0.1:9000/health | grep -q '"ok"'


      - name: Seed CI user
        env:
          CI_PASS: "CiAdmin1!Test"
        run: |
          CI_HASH=$(python3 -c "
          import bcrypt, os
          pw = os.environ['CI_PASS'].encode()
          print(bcrypt.hashpw(pw, bcrypt.gensalt(rounds=10)).decode())
          ")
          # Update existing admin row (created by daemon seed) so login works; avoid REPLACE to keep row identity
          sudo sqlite3 /var/lib/dplaneos/dplaneos.db \
            "UPDATE users SET password_hash='$(echo "$CI_HASH" | sed "s/'/''/g")', active=1, role='admin', must_change_password=0 WHERE username='admin';"
          echo "CI_PASS=$CI_PASS" >> $GITHUB_ENV

      - name: Verify dplaned.service ReadWritePaths covers required paths
        run: |
          # Catches the class of bug where a new write path is added to a handler
          # but not added to the systemd unit - daemon runs fine in CI (no systemd)
          # but fails on real installs with ProtectSystem=strict.
          REQUIRED_PATHS=(
            "/mnt" "/tank" "/data" "/media"
            "/etc/samba" "/etc/exports" "/etc/iscsi" "/etc/ssh"
            "/tmp" "/home"
            "/var/lib/dplaneos" "/var/log/dplaneos"
          )
          SERVICE="install/systemd/dplaned.service"
          MISSING=""
          for p in "${REQUIRED_PATHS[@]}"; do
            grep -q "$p" "$SERVICE" || MISSING="$MISSING $p"
          done
          if [ -n "$MISSING" ]; then
            echo "ERROR: The following paths are missing from ReadWritePaths in $SERVICE:"
            echo " $MISSING"
            echo "Add them or systemd ProtectSystem=strict will block writes on real installs."
            exit 1
          fi
          echo "ReadWritePaths check passed ($(echo "${REQUIRED_PATHS[@]}" | wc -w) paths verified)"

      - name: API integration tests
        run: |
          BASE="http://127.0.0.1:9000"
          PASS=0; FAIL=0; FAILURES=""

          ok()   { echo "  Ô£ô $1"; PASS=$((PASS+1)); }
          fail() { echo "  Ô£ù $1"; FAIL=$((FAIL+1)); FAILURES="${FAILURES}\n  Ô£ù $1"; }

          # assert_json: drill into dotted key path, compare to expected value.
          # If expected is omitted, asserts the value is truthy (non-null, non-empty, non-false).
          assert_json() {
            local label="$1" resp="$2" key="$3" expected="${4:-}"
            if echo "$resp" | python3 -c "
          import sys,json
          try: d=json.load(sys.stdin)
          except: sys.exit(1)
          val=d
          for k in '$key'.split('.'): val=val.get(k) if isinstance(val,dict) else None
          sys.exit(0 if (str(val).lower()=='$expected'.lower() if '$expected' else bool(val)) else 1)
          " 2>/dev/null; then ok "$label"; else fail "$label  (got: $(echo "$resp" | head -c 200))"; fi
          }

          # assert_shape: verify a response has success=true AND that a named field
          # is a non-empty array AND that the first element contains required keys.
          # Usage: assert_shape LABEL RESP ARRAY_KEY KEY1 KEY2 ...
          assert_shape() {
            local label="$1" resp="$2" arr_key="$3"; shift 3
            local required_keys=("$@")
            echo "$resp" | python3 -c "
          import sys, json
          try:
            d = json.load(sys.stdin)
          except:
            print('JSON parse failed'); sys.exit(1)
          if not d.get('success'):
            print('success!=true, error=' + str(d.get('error',''))); sys.exit(1)
          arr = d.get('$arr_key')
          if not isinstance(arr, list):
            print('$arr_key is not a list, got: ' + type(arr).__name__); sys.exit(1)
          if len(arr) == 0:
            sys.exit(0)  # empty is ok for shape check - just verify it IS a list
          first = arr[0]
          missing = [k for k in $(printf "'%s'," "${required_keys[@]}" | sed 's/,$//' | sed "s/'[^']*'/&/g" | python3 -c "import sys; parts=sys.stdin.read().split(','); print('[' + ','.join(repr(p.strip(\\\"'\\\")) for p in parts if p.strip()) + ']'") if k not in first]
          if missing:
            print('first element missing keys: ' + str(missing)); sys.exit(1)
          " 2>/dev/null \
            && ok "$label" \
            || fail "$label  (got: $(echo "$resp" | head -c 200))"
          }

          # assert_array: verify a field in the response is a list (not a string, not null).
          # This catches the class of bug where a handler returns raw text as a JSON field
          # that the frontend tries to .map() over.
          assert_array() {
            local label="$1" resp="$2" key="$3"
            echo "$resp" | python3 -c "
          import sys,json
          try: d=json.load(sys.stdin)
          except: sys.exit(1)
          val=d
          for k in '$key'.split('.'): val=val.get(k) if isinstance(val,dict) else None
          sys.exit(0 if isinstance(val,list) else 1)
          " 2>/dev/null && ok "$label" || fail "$label  (expected array, got: $(echo "$resp" | python3 -c "import sys,json; d=json.load(sys.stdin); print(type(d.get('$key')).__name__)" 2>/dev/null))"
          }

          valid_json() {
            echo "$1" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null
          }

          # ÔöÇÔöÇ 1. PRE-AUTH: first-boot endpoints must be accessible without a session ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
          # This layer catches middleware exemption gaps. If any of these return 401,
          # the setup wizard will fail on a genuinely fresh install.

          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/system/status")
          [ "$CODE" = "200" ] && ok "GET /api/system/status accessible without session" \
            || fail "GET /api/system/status requires session (want 200, got $CODE) - first-boot broken"

          # Use CI_PASS so that if setup-admin succeeds (200) the password it sets
          # is the same one the login step expects. The DB was pre-seeded by the
          # "Seed CI user" step but setup_complete is NOT yet set, so setup-admin
          # will return 200 and set the password. If setup_complete were already
          # set it would return 403 - either is correct; 401 is the bug.
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$BASE/api/system/setup-admin" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"admin\",\"password\":\"$CI_PASS\"}")
          # 200 = password set (setup not yet complete). 403 = already done. Both correct.
          # 401 = blocked by middleware - that's the bug we're guarding against.
          [ "$CODE" = "200" ] || [ "$CODE" = "403" ] \
            && ok "POST /api/system/setup-admin accessible without session (HTTP $CODE)" \
            || fail "POST /api/system/setup-admin blocked by session middleware (want 200/403, got $CODE)"

          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$BASE/api/system/setup-complete" \
            -H "Content-Type: application/json" \
            -d '{}')
          [ "$CODE" = "200" ] || [ "$CODE" = "403" ] \
            && ok "POST /api/system/setup-complete accessible without session (HTTP $CODE)" \
            || fail "POST /api/system/setup-complete blocked by session middleware (want 200/403, got $CODE)"

          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$BASE/api/ha/heartbeat" \
            -H "Content-Type: application/json" \
            -d '{"node_id":"ci-peer","status":"healthy"}')
          [ "$CODE" != "401" ] \
            && ok "POST /api/ha/heartbeat accessible without session (HTTP $CODE)" \
            || fail "POST /api/ha/heartbeat blocked by session middleware (HA peers cannot authenticate)"

          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/health")
          [ "$CODE" = "200" ] && ok "GET /health accessible without session" \
            || fail "GET /health blocked (want 200, got $CODE)"

          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/csrf")
          [ "$CODE" = "200" ] && ok "GET /api/csrf accessible without session" \
            || fail "GET /api/csrf blocked (want 200, got $CODE)"

          # ÔöÇÔöÇ 2. AUTH ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ

          assert_json "/health ok"              "$(curl -sf $BASE/health)"   "status" "ok"
          assert_json "/api/csrf returns token" "$(curl -sf $BASE/api/csrf)" "csrf_token"

          LOGIN_HTTP=$(curl -s -w "\n%{http_code}" -X POST $BASE/api/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"admin\",\"password\":\"$CI_PASS\"}")
          LOGIN=$(echo "$LOGIN_HTTP" | sed '$d')
          LOGIN_CODE=$(echo "$LOGIN_HTTP" | tail -n1)
          if [ "$LOGIN_CODE" != "200" ]; then
            echo "Login failed (HTTP $LOGIN_CODE): $LOGIN"
            exit 1
          fi
          assert_json "Login succeeds"        "$LOGIN" "success" "true"
          assert_json "Login returns session" "$LOGIN" "session_id"

          SESSION=$(echo "$LOGIN" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('session_id',''))" 2>/dev/null)

          CODE=$(curl -s -o /dev/null -w "%{http_code}" $BASE/api/zfs/pools)
          [ "$CODE" = "401" ] && ok "Unauth request ÔåÆ 401" || fail "Unauth request ÔåÆ $CODE (want 401)"

          CODE=$(curl -s -o /dev/null -w "%{http_code}" $BASE/api/zfs/pools -H "X-Session-ID: garbage")
          [ "$CODE" = "401" ] && ok "Bad session ÔåÆ 401" || fail "Bad session ÔåÆ $CODE (want 401)"

          CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST $BASE/api/auth/login \
            -H "Content-Type: application/json" -d '{"username":"admin","password":"wrong"}')
          [ "$CODE" = "401" ] && ok "Wrong password ÔåÆ 401" || fail "Wrong password ÔåÆ $CODE (want 401)"

          CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST $BASE/api/auth/login \
            -H "Content-Type: application/json" -d '{"username":"bad user<>","password":"x"}')
          [ "$CODE" = "400" ] && ok "Malformed username ÔåÆ 400" || fail "Malformed username ÔåÆ $CODE (want 400)"

          WEAK=$(curl -s --max-time 15 -X POST $BASE/api/auth/change-password \
            -H "X-Session-ID: $SESSION" -H "X-User: admin" -H "Content-Type: application/json" \
            -d "{\"current_password\":\"$CI_PASS\",\"new_password\":\"weak\"}")
          assert_json "Weak password rejected" "$WEAK" "success" "false"

          api() {
            local method="$1" path="$2" body="${3:-}"
            local args=(-sf --max-time 15 -X "$method" "$BASE$path"
                        -H "X-Session-ID: $SESSION" -H "X-User: admin"
                        -H "Content-Type: application/json")
            [ -n "$body" ] && args+=(-d "$body")
            curl "${args[@]}" 2>/dev/null || echo '{"_err":true}'
          }

          assert_json "Auth check ÔåÆ authenticated" "$(api GET /api/auth/check)"   "authenticated" "true"
          assert_json "Session ÔåÆ role=admin"        "$(api GET /api/auth/session)" "user.role"     "admin"

          # ÔöÇÔöÇ 3. SYSTEM INFO ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ

          assert_json "System status"    "$(api GET /api/system/status)"    "success" "true"
          assert_json "System profile"   "$(api GET /api/system/profile)"   "success" "true"
          assert_json "System preflight" "$(api GET /api/system/preflight)" "success" "true"
          assert_json "System settings"  "$(api GET /api/system/settings)"  "success" "true"
          assert_json "Metrics current"  "$(api GET /api/metrics/current)"  "success" "true"
          valid_json "$(api GET /api/system/network)"         && ok "System network"  || fail "System network ÔåÆ invalid JSON"
          valid_json "$(api GET '/api/system/logs?lines=20')" && ok "System logs"     || fail "System logs ÔåÆ invalid JSON"
          valid_json "$(api GET /api/system/disks)"           && ok "Disk discovery"  || fail "Disk discovery ÔåÆ invalid JSON"
          valid_json "$(api GET /api/system/ntp)"             && ok "NTP status"      || fail "NTP status ÔåÆ invalid JSON"
          valid_json "$(api GET /api/system/ups)"             && ok "UPS status"      || fail "UPS status ÔåÆ invalid JSON"
          valid_json "$(api GET /api/monitoring/inotify)"     && ok "Inotify stats"   || fail "Inotify stats ÔåÆ invalid JSON"

          # 4. ZFS - shape assertions + write-path round-trips ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ

          POOLS=$(api GET /api/zfs/pools)
          assert_json "ZFS pools success"     "$POOLS" "success" "true"
          # Shape: data must be an array, and each entry must have name, health, capacity
          assert_array "ZFS pools: data is array" "$POOLS" "data"
          COUNT=$(echo "$POOLS" | python3 -c \
            "import sys,json; print(len(json.load(sys.stdin).get('data',[])))" 2>/dev/null || echo 0)
          [ "$COUNT" -ge 1 ] && ok "ZFS pool list ÔåÆ $COUNT pool(s)" || fail "ZFS pool list ÔåÆ empty"
          # Verify required pool fields are present and non-empty in first pool entry
          echo "$POOLS" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          pools=d.get('data',[])
          if not pools: sys.exit(0)
          p=pools[0]
          missing=[k for k in ['name','health','capacity'] if not p.get(k)]
          if missing: print('Pool entry missing fields: '+str(missing)); sys.exit(1)
          " 2>/dev/null && ok "ZFS pool entry has name/health/capacity" \
            || fail "ZFS pool entry missing required fields (name/health/capacity)"

          DS=$(api GET /api/zfs/datasets)
          assert_json "ZFS datasets success" "$DS" "success" "true"
          assert_array "ZFS datasets: data is array" "$DS" "data"
          # Verify required dataset fields present
          echo "$DS" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          items=d.get('data',[])
          if not items: sys.exit(0)
          i=items[0]
          missing=[k for k in ['name','used','avail','mountpoint'] if k not in i]
          if missing: print('Dataset entry missing fields: '+str(missing)); sys.exit(1)
          " 2>/dev/null && ok "ZFS dataset entry has name/used/avail/mountpoint" \
            || fail "ZFS dataset entry missing required fields"

          # Write-path round-trips
          assert_json "Create dataset" \
            "$(api POST /api/zfs/datasets '{"name":"testpool/ci-test","compression":"lz4"}')" \
            "success" "true"
          sudo zfs list testpool/ci-test &>/dev/null \
            && ok "Dataset exists on system after create" \
            || fail "Dataset missing on system after create"

          assert_json "Create snapshot" \
            "$(api POST /api/zfs/snapshots '{"dataset":"testpool/ci-test","name":"ci-snap-1"}')" \
            "success" "true"
          sudo zfs list -t snapshot testpool/ci-test@ci-snap-1 &>/dev/null \
            && ok "Snapshot exists on system after create" \
            || fail "Snapshot missing on system after create"

          SNAPS=$(api GET '/api/zfs/snapshots?dataset=testpool/ci-test')
          assert_json "List snapshots" "$SNAPS" "success" "true"
          SC=$(echo "$SNAPS" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('count',0))" 2>/dev/null || echo 0)
          [ "$SC" -ge 1 ] && ok "Snapshot list ÔåÆ $SC snapshot(s)" || fail "Snapshot list ÔåÆ empty"

          assert_json "Rollback snapshot" \
            "$(api POST /api/zfs/snapshots/rollback '{"snapshot":"testpool/ci-test@ci-snap-1"}')" \
            "success" "true"

          assert_json "Destroy snapshot" \
            "$(api DELETE /api/zfs/snapshots '{"snapshot":"testpool/ci-test@ci-snap-1"}')" \
            "success" "true"
          sudo zfs list -t snapshot testpool/ci-test@ci-snap-1 &>/dev/null \
            && fail "Snapshot still exists after destroy" \
            || ok "Snapshot gone from system after destroy"

          # 4.3. ACL - verify ACL readability on mountpoint
          ACL_DATA=$(api GET "/api/acl/get?path=/mnt/testpool")
          assert_json "ACL read success" "$ACL_DATA" "success" "true"
          
          # Verify write-path: add a test user ACL entry
          # The backend SetACL expects { path, entry, recursive, remove }
          assert_json "ACL set success" \
            "$(api POST /api/acl/set '{"path":"/mnt/testpool","entry":"u:nobody:rwx"}')" \
            "success" "true"
          
          # Read back and verify 'nobody' is mentioned in the ACL output
          ACL_RECHECK=$(api GET "/api/acl/get?path=/mnt/testpool")
          echo "$ACL_RECHECK" | grep -q "nobody" && ok "ACL set verified: 'nobody' entry found" || fail "ACL set verified: 'nobody' NOT found"

          valid_json "$(api GET /api/zfs/health)"          && ok "ZFS health"         || fail "ZFS health ÔåÆ invalid JSON"
          valid_json "$(api GET /api/zfs/iostat)"          && ok "ZFS iostat"         || fail "ZFS iostat ÔåÆ invalid JSON"
          valid_json "$(api GET /api/zfs/capacity)"        && ok "ZFS capacity"       || fail "ZFS capacity ÔåÆ invalid JSON"
          valid_json "$(api GET /api/zfs/smart)"           && ok "ZFS SMART"          || fail "ZFS SMART ÔåÆ invalid JSON"
          valid_json "$(api GET /api/snapshots/schedules)" && ok "Snapshot schedules" || fail "Snapshot schedules ÔåÆ invalid JSON"

          # ÔöÇÔöÇ 5. USERS - write-path round-trip ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ

          USERS=$(api GET /api/rbac/users)
          assert_json "User list" "$USERS" "success" "true"
          assert_array "User list: users is array" "$USERS" "users"
          ADMIN_IN=$(echo "$USERS" | python3 -c \
            "import sys,json; print('yes' if any(u['username']=='admin' for u in json.load(sys.stdin).get('users',[])) else 'no')" 2>/dev/null)
          [ "$ADMIN_IN" = "yes" ] && ok "Admin visible in user list" || fail "Admin not in user list"

          assert_json "Create user" \
            "$(api POST /api/users/create \
              '{"action":"create","username":"ci-testuser","password":"CiTest1!Pass","email":"ci@test.local","role":"user"}')" \
            "success" "true"
          NEW_IN=$(api GET /api/rbac/users | python3 -c \
            "import sys,json; print('yes' if any(u['username']=='ci-testuser' for u in json.load(sys.stdin).get('users',[])) else 'no')" 2>/dev/null)
          [ "$NEW_IN" = "yes" ] && ok "New user visible in list after create" || fail "New user missing after create"

          # ÔöÇÔöÇ 6. SMB SHARES - write-path round-trip (catches field-name mismatches) ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
          # The bugs we found: frontend sent read_only/guest_ok but backend expected readonly/guestok.
          # This test creates a share with known field values then reads them back and asserts match.

          CREATE_SHARE=$(api POST /api/shares \
            '{"action":"create","name":"ci-share","path":"/tmp","comment":"CI test","read_only":true,"guest_ok":false,"browsable":true}')
          assert_json "Create SMB share" "$CREATE_SHARE" "success" "true"

          SHARES=$(api GET /api/shares)
          assert_json "Shares list success"   "$SHARES" "success" "true"
          assert_array "Shares list: shares is array" "$SHARES" "shares"
          # Assert the share we just created has the correct read_only value
          echo "$SHARES" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          shares=d.get('shares',[])
          s=next((x for x in shares if x.get('name')=='ci-share'),None)
          if not s:
            print('ci-share not found in list'); sys.exit(1)
          if s.get('read_only') is not True:
            print('read_only field wrong - expected True, got: '+repr(s.get('read_only'))); sys.exit(1)
          if 'path' not in s:
            print('path field missing from share entry'); sys.exit(1)
          " 2>/dev/null \
            && ok "Share round-trip: read_only field correctly stored and returned" \
            || fail "Share round-trip: field name mismatch (read_only/guest_ok not persisted correctly)"

          assert_json "Delete SMB share" \
            "$(api DELETE /api/shares '{"name":"ci-share"}')" \
            "success" "true"
          GONE=$(api GET /api/shares | python3 -c \
            "import sys,json; print('yes' if any(s.get('name')=='ci-share' for s in json.load(sys.stdin).get('shares',[])) else 'no')" 2>/dev/null)
          [ "$GONE" = "no" ] && ok "Share gone after delete" || fail "Share still present after delete"

          # ÔöÇÔöÇ 7. NFS EXPORTS - write-path round-trip ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
          # nfs-kernel-server is installed in CI. If the daemon reports it missing,
          # that itself is a test failure (we installed it - nfsInstalled() is wrong).

          CREATE_NFS=$(api POST /api/nfs/exports \
            '{"path":"/tmp","clients":"127.0.0.1","options":"ro,sync","enabled":true}')

          # Check if NFS is available on this system
          NFS_AVAIL=$(echo "$CREATE_NFS" | python3 -c "
          import sys,json
          try:
            d=json.load(sys.stdin)
            if 'not installed' in str(d.get('error','')).lower():
              print('unavailable')
            else:
              print('available')
          except:
            print('error')
          " 2>/dev/null)

          if [ "$NFS_AVAIL" = "unavailable" ]; then
            ok "NFS exports: skipped (nfs-kernel-server not installed on this runner)"
          else
            assert_json "Create NFS export" "$CREATE_NFS" "success" "true"
            NFS_ID=$(echo "$CREATE_NFS" | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null)

            NFS_LIST=$(api GET /api/nfs/exports)
            assert_json "NFS exports list success" "$NFS_LIST" "success" "true"
            assert_array "NFS exports: exports is array" "$NFS_LIST" "exports"
            echo "$NFS_LIST" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          exports=d.get('exports',[])
          e=next((x for x in exports if x.get('path')=='/tmp'),None)
          if not e:
            print('/tmp export not found'); sys.exit(1)
          for f in ['id','path','clients','options','enabled']:
            if f not in e: print('NFS export missing field: '+f); sys.exit(1)
            " 2>/dev/null \
              && ok "NFS export round-trip: all fields present" \
              || fail "NFS export round-trip: missing required fields"

            if [ -n "$NFS_ID" ] && [ "$NFS_ID" != "None" ]; then
              assert_json "Delete NFS export" \
                "$(api DELETE /api/nfs/exports/$NFS_ID)" \
                "success" "true"
            fi
          fi

          # ÔöÇÔöÇ 8. DOCKER - shape assertion (catches PascalCase vs lowercase field bugs) ÔöÇÔöÇÔöÇÔöÇÔöÇ
          # The bug: backend returned Id/Image/State (PascalCase), frontend read id/image/state.
          # This test asserts the lowercase keys are present in the response.

          CTRS=$(api GET /api/docker/containers)
          assert_json "Docker containers success" "$CTRS" "success" "true"
          assert_array "Docker containers: containers is array" "$CTRS" "containers"
          # If there are any containers running, verify lowercase field contract
          echo "$CTRS" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          ctrs=d.get('containers',[])
          if not ctrs: sys.exit(0)  # no containers running - shape check n/a
          c=ctrs[0]
          missing=[k for k in ['id','name','image','state'] if k not in c]
          if missing: print('Container missing lowercase fields: '+str(missing)); sys.exit(1)
          " 2>/dev/null \
            && ok "Docker container entry has lowercase id/name/image/state" \
            || fail "Docker container entry missing lowercase fields (PascalCase-only response)"
          valid_json "$(api GET /api/docker/preflight)" && ok "Docker preflight" || fail "Docker preflight ÔåÆ invalid JSON"

          # ÔöÇÔöÇ 9. FILE MANAGER - full write-path round-trip ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
          # Covers: mkdir, list (assert entry present), write, read back (assert content),
          # rename (assert new name, old gone), chmod (assert mode), delete.
          # This catches: wrong field names in requests, wrong HTTP methods,
          # UploadChunk chunk vs chunkIndex mismatch, chmod mode vs permissions mismatch.

          sudo mkdir -p /tmp/ci-files-test
          assert_json "Files: mkdir" \
            "$(api POST /api/files/mkdir '{"path":"/tmp/ci-files-test/subdir"}')" \
            "success" "true"
          sudo test -d /tmp/ci-files-test/subdir \
            && ok "Files: mkdir created directory on disk" \
            || fail "Files: mkdir did not create directory"

          LIST=$(api GET '/api/files/list?path=/tmp/ci-files-test')
          assert_json "Files: list success"    "$LIST" "success" "true"
          assert_array "Files: list is array"  "$LIST" "files"
          # Assert the listing has required fields (mtime as string, not int)
          echo "$LIST" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          files=d.get('files',[])
          if not files: sys.exit(0)
          f=files[0]
          missing=[k for k in ['name','path','size','is_dir','mode','mtime'] if k not in f]
          if missing: print('File entry missing fields: '+str(missing)); sys.exit(1)
          mtime=f.get('mtime','')
          if not isinstance(mtime,str) or len(mtime)<10:
            print('mtime is not an ISO string: '+repr(mtime)); sys.exit(1)
          " 2>/dev/null \
            && ok "Files: list entry has correct shape (name/path/size/is_dir/mode/mtime as ISO string)" \
            || fail "Files: list entry shape wrong (missing fields or mtime not ISO string)"

          assert_json "Files: write text file" \
            "$(api POST /api/files/write '{"path":"/tmp/ci-files-test/hello.txt","content":"hello ci"}')" \
            "success" "true"
          sudo test -f /tmp/ci-files-test/hello.txt \
            && ok "Files: write created file on disk" \
            || fail "Files: write did not create file"

          READ=$(api GET '/api/files/read?path=/tmp/ci-files-test/hello.txt')
          assert_json "Files: read success"   "$READ" "success" "true"
          echo "$READ" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          c=d.get('content','')
          sys.exit(0 if c=='hello ci' else 1)
          " 2>/dev/null \
            && ok "Files: read-back content matches written content" \
            || fail "Files: read-back content mismatch (got: $(echo "$READ" | python3 -c "import sys,json; print(json.load(sys.stdin).get('content',''))" 2>/dev/null))"

          assert_json "Files: rename" \
            "$(api POST /api/files/rename '{"old_path":"/tmp/ci-files-test/hello.txt","new_name":"renamed.txt"}')" \
            "success" "true"
          sudo test -f /tmp/ci-files-test/renamed.txt \
            && ok "Files: rename created new file on disk" \
            || fail "Files: rename did not create renamed file"
          sudo test ! -f /tmp/ci-files-test/hello.txt \
            && ok "Files: rename removed old file from disk" \
            || fail "Files: rename left old file behind"

          assert_json "Files: chmod" \
            "$(api POST /api/files/chmod '{"path":"/tmp/ci-files-test/renamed.txt","mode":"0600"}')" \
            "success" "true"
          MODE=$(sudo stat -c "%a" /tmp/ci-files-test/renamed.txt 2>/dev/null)
          [ "$MODE" = "600" ] \
            && ok "Files: chmod set correct mode 600 on disk" \
            || fail "Files: chmod mode wrong - expected 600, got $MODE (mode vs permissions field mismatch?)"

          assert_json "Files: delete" \
            "$(api POST /api/files/delete '{"path":"/tmp/ci-files-test/renamed.txt"}')" \
            "success" "true"
          sudo test ! -f /tmp/ci-files-test/renamed.txt \
            && ok "Files: delete removed file from disk" \
            || fail "Files: delete did not remove file"

          # ÔöÇÔöÇ 10. FIREWALL - assert rules is an array not a raw string ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
          # The bug: GetStatus returned rules as raw ufw text. Frontend called .map() on a
          # string - runtime crash. This asserts the field is always an array.

          FW=$(api GET /api/firewall/status)
          assert_json "Firewall status success" "$FW" "success" "true"
          assert_array "Firewall: rules is array (not raw text)" "$FW" "rules"

          # ÔöÇÔöÇ 11. REMAINING SUBSYSTEMS - valid JSON + success ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ

          assert_json "Git sync config"   "$(api GET /api/git-sync/config)"     "success" "true"
          assert_json "Webhooks"          "$(api GET /api/alerts/webhooks)"      "success" "true"
          assert_json "SMTP config"       "$(api GET /api/alerts/smtp)"          "success" "true"
          assert_json "LDAP config"       "$(api GET /api/ldap/config)"          "success" "true"
          assert_json "HA status"         "$(api GET /api/ha/status)"            "success" "true"
          assert_json "My permissions"    "$(api GET /api/rbac/me/permissions)"  "success" "true"
          assert_json "API tokens"        "$(api GET /api/auth/tokens)"          "success" "true"

          valid_json "$(api GET /api/git-sync/repos)"  && ok "Git sync repos"  || fail "Git sync repos ÔåÆ invalid JSON"
          valid_json "$(api GET /api/ldap/status)"     && ok "LDAP status"     || fail "LDAP status ÔåÆ invalid JSON"
          valid_json "$(api GET /api/iscsi/status)"    && ok "iSCSI status"    || fail "iSCSI status ÔåÆ invalid JSON"
          valid_json "$(api GET /api/sandbox/list)"    && ok "Sandbox list"    || fail "Sandbox list ÔåÆ invalid JSON"
          valid_json "$(api GET /api/trash/list)"      && ok "Trash list"      || fail "Trash list ÔåÆ invalid JSON"
          valid_json "$(api GET /api/removable/list)"  && ok "Removable media" || fail "Removable media ÔåÆ invalid JSON"
          valid_json "$(api GET /api/power/disks)"     && ok "Power/spindown"  || fail "Power/spindown ÔåÆ invalid JSON"
          valid_json "$(api GET /api/certs/list)"      && ok "Certs"           || fail "Certs ÔåÆ invalid JSON"

          ROLES=$(api GET /api/rbac/roles)
          assert_json "RBAC roles list" "$ROLES" "count"
          RC=$(echo "$ROLES" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('roles',[])))" 2>/dev/null || echo 0)
          [ "$RC" -ge 1 ] && ok "RBAC roles ÔåÆ $RC role(s)" || fail "RBAC roles ÔåÆ empty"

          # ÔöÇÔöÇ 12. SECURITY ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ

          INJECT=$(curl -s --max-time 15 -X POST $BASE/api/zfs/command \
            -H "X-Session-ID: $SESSION" -H "X-User: admin" -H "Content-Type: application/json" \
            -d "{\"command\":\"ls\",\"args\":[\"/etc/passwd\"],\"session_id\":\"$SESSION\",\"user\":\"admin\"}")
          echo "$INJECT" | grep -q '"success":false\|Forbidden\|not allowed\|Command not found' \
            && ok "Command injection blocked" || fail "Command injection NOT blocked"

          PROM=$(curl -sf --max-time 5 $BASE/metrics \
            -H "X-Session-ID: $SESSION" -H "X-User: admin" 2>/dev/null || echo "")
          [ -n "$PROM" ] && ok "Prometheus /metrics responds" || fail "Prometheus /metrics no response"

          # ÔöÇÔöÇ 12.5 DATA READINESS (v6) ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
          
          # Unmount the enforcement dataset to simulate "not ready" state
          sudo zfs unmount testpool/ci-enforcement
          
          CHECK=$(api GET /api/system/preflight)
          # The backend checkDataReadiness is used in ApplyPlan, but we should also check
          # if the preflight or a specialized readiness endpoint reflects this.
          # For v6 CI, we verify that the system detects the unmounted state.
          echo "$CHECK" | grep -q "not mounted\|unmounted\|warning\|error" \
            && ok "Data readiness: unmounted dataset detected" \
            || fail "Data readiness: unmounted dataset NOT detected in preflight"
          
          # Remount for cleanup
          sudo zfs mount testpool/ci-enforcement

          # ÔöÇÔöÇ 12.6 AUDIT INTEGRITY (v6) ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
          
          # Since the daemon has been running and processing API calls (ZFS, Files, etc.),
          # there should be a valid audit chain.
          AUDIT_VERIFY=$(api GET /api/system/audit/verify-chain)
          assert_json "Audit chain: integrity verified" "$AUDIT_VERIFY" "valid" "true"
          assert_json "Audit chain: rows checked"      "$AUDIT_VERIFY" "checked_rows"

          # ÔöÇÔöÇ 13. LOGOUT ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ

          assert_json "Logout" "$(api POST /api/auth/logout)" "success" "true"
          AUTHED=$(curl -sf $BASE/api/auth/check -H "X-Session-ID: $SESSION" | \
            python3 -c "import sys,json; print(json.load(sys.stdin).get('authenticated'))" 2>/dev/null)
          [ "$AUTHED" = "False" ] || [ "$AUTHED" = "false" ] \
            && ok "Session dead after logout" \
            || fail "Session still valid after logout"

          # ÔöÇÔöÇ SUMMARY ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ

          echo ""
          echo "ÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉ"
          printf "  Results: Ô£ô %d passed   Ô£ù %d failed\n" "$PASS" "$FAIL"
          echo "ÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉÔòÉ"
          if [ "$FAIL" -gt 0 ]; then
            printf "Failures:$FAILURES\n"
            exit 1
          fi

      - name: Dump daemon log on failure
        if: failure()
        run: cat /tmp/dplaned.log || true

      - name: Cleanup
        if: always()
        run: |
          [ -f /tmp/dplaned.pid ] && sudo kill $(cat /tmp/dplaned.pid) 2>/dev/null || true
          sudo zpool destroy testpool 2>/dev/null || true
          sudo losetup -d "$LOOP0" "$LOOP1" "$LOOP2" 2>/dev/null || true

